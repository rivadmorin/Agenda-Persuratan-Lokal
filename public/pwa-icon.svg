<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#005faf" />
      <stop offset="100%" stop-color="#002d5f" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>
  <!-- Background Circle with modern styling -->
  <circle cx="256" cy="256" r="240" fill="url(#blueGrad)" />
