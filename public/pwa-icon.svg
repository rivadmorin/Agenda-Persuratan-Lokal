  <g filter="url(#shadow)">
    <rect x="112" y="152" width="288" height="208" rx="24" fill="#ffffff" />
    <!-- Envelope flaps -->
    <path d="M112 176 L242.7 274 C250.6 280 261.4 280 269.3 274 L400 176" stroke="#005faf" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <path d="M112 336 L200 250" stroke="#005faf" stroke-width="10" stroke-linecap="round" fill="none" />
    <path d="M400 336 L312 250" stroke="#005faf" stroke-width="10" stroke-linecap="round" fill="none" />
  </g>
</svg>
